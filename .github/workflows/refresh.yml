name: Refresh QQQQ holdings

# Recurring cron job that refreshes the component & allocation data.
# GitHub Actions runners have full network access, so this is where the
# live Invesco / Yahoo Finance fetch actually runs (the dashboard itself
# is static and just reads the committed JSON).
on:
  schedule:
    # Every 30 min during US market hours (Mon-Fri, ~9:30-16:00 ET = 13:30-20:00 UTC).
    - cron: '*/30 13-20 * * 1-5'
    # One post-close snapshot to lock in the day's allocations.
    - cron: '15 21 * * 1-5'
  workflow_dispatch: {}

# Avoid overlapping runs.
concurrency:
  group: refresh-holdings
  cancel-in-progress: false

permissions:
  contents: write
  # Needed to open / update the stale-data alert issue below.
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh holdings data
        id: refresh
        env:
          # Optional: set repo secret FMP_API_KEY for a reliable holdings/price
          # source. Without it the job uses Invesco + Yahoo Finance only.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: node scripts/fetch-holdings.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/holdings.json data/monthly-allocations.json data/changes.json data/price-history.json data/refresh-status.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh QQQQ holdings ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi

      # A hard failure of the refresh step already fails the job loudly. This
      # catches the quieter case: the job succeeds but no live source could be
      # reached, so the committed data (and the dashboard) may be stale.
      - name: Open stale-data alert
        if: steps.refresh.outputs.fallback == 'true'
        uses: actions/github-script@v7
        env:
          DATA_SOURCE: ${{ steps.refresh.outputs.source }}
        with:
          script: |
            const title = 'Data refresh fell back to stale data';
            const source = process.env.DATA_SOURCE || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const body = [
              `The scheduled refresh could not reach a live holdings source `,
              `(Invesco / FMP / SEC) and fell back to \`${source}\` data.`,
              ``,
              `The dashboard is still online but its holdings may be stale. `,
              `A later run that reaches a live source will close this automatically.`,
              ``,
              `Refresh run: ${runUrl}`,
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 100,
            });
            const existing = issues.find((i) => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body,
              });
            }

      - name: Close stale-data alert on recovery
        if: steps.refresh.outputs.fallback == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Data refresh fell back to stale data';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 100,
            });
            const existing = issues.find((i) => i.title === title && !i.pull_request);
            if (existing) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
                `/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: `A refresh reached a live source again — data is fresh. Closing.\n\nRun: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, state: 'closed',
              });
            }
