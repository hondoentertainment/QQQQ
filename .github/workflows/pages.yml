name: Deploy to GitHub Pages

# Publishes the static dashboard to GitHub Pages. Runs on every push to main
# (including the data commits made by refresh.yml) so the live site stays
# current. Requires Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site/data
          cp index.html styles.css app.js _site/
          cp data/*.json _site/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
