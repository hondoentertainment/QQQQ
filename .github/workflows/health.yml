name: Production health

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Production smoke test
        run: node scripts/smoke-prod.mjs
        env:
          PROD_URL: https://qqqq-plum.vercel.app
